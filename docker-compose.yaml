version: '3'

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
  db:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_DB: networkmonitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  app:
    build: .
    volumes:
      - ./:/code/
    ports:
      - 8050:8050
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
  test:
    build: .
    environment:
      DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
      POSTGRES_SERVER: db
      POSTGRES_DBNAME: networkmonitor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pytest
  worker:
    build: .
    volumes:
      - ./:/code/
    command: celery -A networkmonitor worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
