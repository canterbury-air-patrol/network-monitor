version: 2

updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      django:
        patterns:
          - "Django*"
          - "psycopg2*"
          - "django-*"
      testing:
        patterns:
          - "pytest*"
          - "factory-boy"
      linting:
        patterns:
          - "ruff"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5

